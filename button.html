<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Botão centralizado com design premium em vermelho." />
  <title>Botão Vermelho</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Brilho de fundo -->
  <div class="bg-glow" aria-hidden="true"></div>

  <!-- Card principal -->
  <main class="card" role="main">

    <!-- Badge -->
    <span class="badge" aria-label="Status ativo">
      <span class="badge-dot"></span>
      Ativo
    </span>

    <!-- Cabeçalho -->
    <hgroup class="card-heading">
      <h1 class="card-title">Confirmar <span>Ação</span></h1>
      <p class="card-subtitle">
        Revise antes de prosseguir. Esta operação não pode ser desfeita depois de confirmada.
      </p>
    </hgroup>

    <div class="divider" aria-hidden="true"></div>

    <!-- Botões -->
    <div class="btn-group">

      <!-- Botão principal vermelho -->
      <button class="btn" id="btnConfirm" aria-label="Confirmar ação">
        <span>Confirmar</span>
        <span class="btn-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </span>
      </button>

      <!-- Botão secundário ghost -->
      <button class="btn-ghost" id="btnCancel" aria-label="Cancelar ação">
        Cancelar
      </button>

    </div>

    <!-- Rodapé do card -->
    <footer class="card-footer">
      <span>Seguro</span>
      <span class="card-footer-dot" aria-hidden="true"></span>
      <span>Criptografado</span>
      <span class="card-footer-dot" aria-hidden="true"></span>
      <span>Reversível em 24h</span>
    </footer>

  </main>

  <script>
    // Efeito Ripple
    function createRipple(e, el) {
      const rect = el.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const x = e.clientX - rect.left - size / 2;
      const y = e.clientY - rect.top - size / 2;

      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
      el.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());
    }

    document.getElementById('btnConfirm').addEventListener('click', function (e) {
      createRipple(e, this);
    });

    document.getElementById('btnCancel').addEventListener('click', function () {
      alert('Ação cancelada.');
    });
  </script>

</body>
</html>
