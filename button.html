<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Botão Vermelho</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      overflow: hidden;
    }

    /* Fundo animado com brilho sutil */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 50%, rgba(220, 38, 38, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .btn-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px 52px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      outline: none;
      transition:
        transform 0.2s cubic-bezier(.34,1.56,.64,1),
        box-shadow 0.2s ease;
      box-shadow:
        0 4px 24px rgba(239, 68, 68, 0.45),
        0 1px 0 rgba(255,255,255,0.1) inset;
    }

    /* Brilho interno animado */
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%);
      opacity: 1;
      transition: opacity 0.3s;
    }

    /* Anel de foco acessível */
    .btn:focus-visible {
      box-shadow:
        0 0 0 3px #0f0f13,
        0 0 0 6px #ef4444,
        0 4px 24px rgba(239, 68, 68, 0.45);
    }

    /* Hover */
    .btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow:
        0 8px 40px rgba(239, 68, 68, 0.6),
        0 1px 0 rgba(255,255,255,0.15) inset;
    }

    /* Active / Click */
    .btn:active {
      transform: translateY(1px) scale(0.98);
      box-shadow:
        0 2px 12px rgba(239, 68, 68, 0.35),
        0 1px 0 rgba(255,255,255,0.08) inset;
    }

    /* Ícone SVG inline */
    .btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
    }

    .btn:hover svg {
      transform: scale(1.2) rotate(-8deg);
    }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      transform: scale(0);
      animation: ripple-anim 0.55s linear;
      pointer-events: none;
    }

    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* Label abaixo */
    .btn-label {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="btn-wrapper">
    <button class="btn" id="redBtn" aria-label="Clique aqui">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm1 14.93V17a1 1 0 0 1-2 0v-.07A7 7 0 0 1 5.07 11H5a1 1 0 0 1 0-2h.07A7 7 0 0 1 11 3.07V3a1 1 0 0 1 2 0v.07A7 7 0 0 1 18.93 9H19a1 1 0 0 1 0 2h-.07A7 7 0 0 1 13 16.93z"/>
      </svg>
      Clique aqui
    </button>
    <span class="btn-label">Botão centralizado · vermelho</span>
  </div>

  <script>
    const btn = document.getElementById('redBtn');

    btn.addEventListener('click', function (e) {
      // Cria ripple no ponto do clique
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const x = e.clientX - rect.left - size / 2;
      const y = e.clientY - rect.top - size / 2;

      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
      btn.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());
    });
  </script>

</body>
</html>
